<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GlobePort Level 0 DFD — MSU Denver</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Source+Sans+3:wght@300;400;600;700&display=swap');

  :root {
    --red:    #C8102E;
    --red-lt: #e8274b;
    --navy:   #003DA5;
    --navy-lt:#1a5fd4;
    --gold:   #F0A500;
    --white:  #f4f6fa;
    --muted:  #8a9ab5;
    --bg:     #04060b;
    --bg2:    #0b0f1a;
    --border: #1c2440;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Source Sans 3', sans-serif;
    color: var(--white);
    padding: 40px 20px 60px;
  }

  /* ---- HEADER ---- */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }

  .header .school-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--red);
    border: 1px solid var(--red);
    border-radius: 3px;
    padding: 4px 14px;
    margin-bottom: 16px;
  }

  .header h1 {
    font-family: 'Merriweather', serif;
    font-size: 30px;
    font-weight: 900;
    line-height: 1.2;
    color: var(--white);
    margin-bottom: 8px;
  }

  .header h1 span { color: var(--red); }

  .header .sub {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  /* ---- LEGEND ---- */
  .legend {
    display: flex;
    gap: 32px;
    justify-content: center;
    margin-bottom: 44px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--muted);
  }

  .l-dot {
    width: 18px; height: 18px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; color: white;
  }
  .l-actor   { background: #071f3a; border: 2px solid #1a5fd4; }
  .l-process { background: #1a0009; border: 2px solid #C8102E; }
  .l-store   { background: #0d1f07; border: 2px solid #3fa832; }

  /* ---- SVG WRAPPER ---- */
  .diagram-wrap {
    max-width: 1400px;
    margin: 0 auto;
  }

  svg { width: 100%; height: auto; display: block; }

  .node-g { cursor: default; }
  .node-g:hover rect { filter: brightness(1.2); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="school-tag">Metropolitan State University of Denver</div>
  <h1>GlobePort <span>Level 0 DFD</span></h1>
  <p class="sub">CIS 3050 &nbsp;·&nbsp; Automated Global Registration System &nbsp;·&nbsp; 9 Processes &nbsp;·&nbsp; 7 Actors &nbsp;·&nbsp; 6 Data Stores</p>
</div>

<!-- LEGEND -->
<div class="legend">
  <div class="legend-item"><div class="l-dot l-actor"></div> External Actor</div>
  <div class="legend-item"><div class="l-dot l-process"></div> Process</div>
  <div class="legend-item"><div class="l-dot l-store"></div> Data Store</div>
</div>

<!-- DIAGRAM -->
<div class="diagram-wrap">
<svg viewBox="0 0 1360 2200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- ARROWS -->
  <marker id="a-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 2 L8 5 L1 8" fill="none" stroke="#1a5fd4" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="a-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 2 L8 5 L1 8" fill="none" stroke="#3fa832" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="a-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 2 L8 5 L1 8" fill="none" stroke="#C8102E" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="a-gold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 2 L8 5 L1 8" fill="none" stroke="#F0A500" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>

  <!-- glow filters -->
  <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
    <feFlood flood-color="#C8102E" flood-opacity="0.4" result="color"/>
    <feComposite in="color" in2="blur" operator="in" result="shadow"/>
    <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
    <feFlood flood-color="#1a5fd4" flood-opacity="0.35" result="color"/>
    <feComposite in="color" in2="blur" operator="in" result="shadow"/>
    <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
